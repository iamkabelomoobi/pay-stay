services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: ${WEB_CONTAINER_PROD:-kasistay-web-prod}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: ${SERVER_CONTAINER_PROD:-kasistay-server-prod}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      SERVER_URL: ${SERVER_URL:-http://localhost:4000}
      CUSTOMER_URL: ${CUSTOMER_URL:-http://localhost:3000}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB_PROD}
    ports:
      - "${SERVER_PORT:-4000}:${PORT:-4000}"

  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${POSTGRES_CONTAINER_PROD}
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_PROD}
    volumes:
      - ${POSTGRES_VOLUME_PROD}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_PROD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE}
    container_name: ${REDIS_CONTAINER_PROD}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ${REDIS_VOLUME_PROD}:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_prod:
    name: ${POSTGRES_VOLUME_PROD}
  redis_data_prod:
    name: ${REDIS_VOLUME_PROD}

networks:
  default:
    name: ${APP_NETWORK}
